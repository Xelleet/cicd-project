name: CI/CD Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run tests
        run: python test_calculator.py
deploy:
  runs-on: ubuntu-latest
  needs: test
  steps:
    - name: Deploy
      run: echo "Deploying..."
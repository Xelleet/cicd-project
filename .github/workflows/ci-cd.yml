name: CI/CD Pipeline
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Скачать код
        uses: actions/checkout@v4
      - name: Установить Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Запустить тесты
        run: python test_calculator.py
      - name: Показать, что код работает
        run: python calculator.py

deploy:
  runs-on: ubuntu-latest
  needs: test
  steps:
    - name: Симуляция деплоя
      run: |
        echo 'Деплоим приложение'
        echo 'Приложение развернуто на https://my-app.com'